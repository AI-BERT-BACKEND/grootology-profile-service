server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eciplanner_profile
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}

jwt:
  secret: ${JWT_SECRET}
